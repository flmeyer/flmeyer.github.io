<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != '' %}{{ page.title }} — {% endif %}Florian Meyer</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/site.css">
</head>
<body>
<div class="site">
  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/"><span class="brand-diamond">◆</span><span class="brand-text">FM</span></a>
      <div class="nav-links">
        <a class="nav-a{% if page.url == '/about/' %} on{% endif %}" href="/about/">about</a>
        <a class="nav-a{% if page.url contains '/projects' %} on{% endif %}" href="/projects/">projects</a>
        <a class="nav-a{% if page.url contains '/publications' %} on{% endif %}" href="/publications/">publications</a>
      </div>
    </div>
  </nav>

  {{ content }}

  <footer class="foot">
    <div class="foot-in">
      <span>&copy; {{ 'now' | date: '%Y' }} Florian Meyer</span>
      <div class="foot-links">
        <a class="foot-a" href="https://github.com/flmeyer" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a class="foot-a" href="https://www.linkedin.com/in/florian-meyer-b1542b117" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a class="foot-a" href="https://scholar.google.com/citations?user=jJoLCvsAAAAJ" target="_blank" rel="noopener noreferrer">Scholar</a>
      </div>
    </div>
  </footer>
</div>
<script src="/assets/js/canvas.js"></script>
</body>
</html>
